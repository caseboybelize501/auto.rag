version: '3.8'

services:
  neo4j:
    image: neo4j:5
    ports:
      - '7474:7474'
      - '7687:7687'
    environment:
      - NEO4J_AUTH=none

  postgres:
    image: postgres:latest
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_DB=kgrag
      - POSTGRES_USER=kgrag
      - POSTGRES_PASSWORD=kgrag
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:latest
    ports:
      - '6379:6379'

  api:
    build: ./server
    ports:
      - '8000:8000'
    depends_on:
      - neo4j
      - postgres
      - redis
    environment:
      - CONFLUENCE_TOKEN=
      - NOTION_TOKEN=
      - SLACK_TOKEN=
      - GOOGLE_SA_JSON=
      - SHAREPOINT_CLIENT_ID=
      - TENANT_ID=
      - LOCAL_DOCS_PATH=./docs

  dashboard:
    build: ./dashboard
    ports:
      - '3000:3000'
    depends_on:
      - api

volumes:
  pgdata:
